services:

  nginx:
    image: nginx:1.27          # versión fija, no latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro   # read-only
    depends_on:
      - app
    networks:
      - tfg-net
    cap_drop:
      - ALL                    # elimina todas las capacidades del kernel
    cap_add:
      - NET_BIND_SERVICE       # solo la necesaria para abrir puerto 80

  app:
    build: .
    volumes:
      - ./app:/var/www/html:ro  # la app no necesita escribir en su propio código
    depends_on:
      - db
    networks:
      - tfg-net
    cap_drop:
      - ALL

  db:
    image: mysql:8.0           # versión fija
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tfg-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID                 # MySQL los necesita para gestionar ficheros de datos

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    # Puerto eliminado: no necesita exposición externa, Prometheus lo accede por red interna
    networks:
      - tfg-net

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    command:
      - "--mysqld.address=db:3306"       # nombre de servicio interno, no nombre de contenedor
      - "--mysqld.username=root"
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # Puerto eliminado: solo Prometheus necesita accederlo
    depends_on:
      - db
    networks:
      - tfg-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro   # read-only
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
      - mysqld-exporter
    networks:
      - tfg-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${SMTP_USER}
      GF_SMTP_FROM_NAME: "Grafana TFG"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tfg-net

volumes:
  db_data:
  grafana_data:

networks:
  tfg-net:
    driver: bridge
